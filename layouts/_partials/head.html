<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
    
    {{ hugo.Generator }}
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    {{- with .Site.Params.Colors -}}
    <link rel="stylesheet" href="{{ (printf "/css/colors-%s.css" .) }}">
    {{- else -}}
    <link rel="stylesheet" href="{{ "/css/colors-default.css" }}">
    {{ end }}
    <link rel="stylesheet" href="{{ "/css/style.css" }}">
    {{- with .Site.Params.CustomStylesheet -}}
    <link rel="stylesheet" href="/{{ . }}">
    {{ end }}
    {{ with .OutputFormats.Get "rss" -}}
    {{ printf `<link rel=%q type=%q href=%q title=%q>` .Rel .MediaType.Type .Permalink site.Title | safeHTML }}
    {{ end }}

    <link rel="icon" type="image/svg+xml" href="/nikthink-logo.svg">

    <script src="/js/3rdparty/tablesort.js"></script>
    <script src="/js/3rdparty/tablesort.number.js"></script>
    <script src="/js/main.js"></script>
</head>
